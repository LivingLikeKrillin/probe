name: Probe PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  probe-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build Probe
        run: pnpm build

      - name: Run Probe Check
        id: probe
        run: |
          RESULT=$(npx probe check --base origin/${{ github.base_ref }} --format markdown)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.probe.outputs.report }}`;
            if (report && report.trim()) {
              // 기존 Probe 코멘트 찾기
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body.includes('⚙️ Probe'));

              const body = `⚙️ Probe — PR 범위 분석\n\n${report}`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }
